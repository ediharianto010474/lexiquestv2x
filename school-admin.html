<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiQuest V2 - Portal Guru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 min-h-screen font-['Poppins'] flex items-center justify-center text-white p-4">

    <div id="login-section" class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-blue-500 text-center">
        <i class="fas fa-chalkboard-teacher text-5xl text-blue-500 mb-4"></i>
        <h1 class="text-2xl font-black mb-2">PORTAL GURU</h1>
        <p class="text-slate-400 text-sm mb-6">Sila masukkan Passcode Sekolah anda</p>
        
        <input type="password" id="teacher-pass" placeholder="Contoh: SCX2026" class="w-full p-4 mb-4 bg-slate-700 text-white rounded-xl outline-none text-center tracking-widest text-lg font-mono focus:ring-2 focus:ring-blue-500">
        <button id="btn-login" onclick="loginTeacher()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all shadow-lg hover:shadow-blue-500/30">
            MASUK
        </button>
    </div>

    <div id="dashboard-section" class="hidden w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        <div class="bg-slate-900 p-8 md:w-1/3 border-b md:border-b-0 md:border-r border-slate-700 flex flex-col justify-between">
            <div>
                <h2 class="text-blue-400 font-bold text-sm tracking-widest mb-1">SEKOLAH</h2>
                <p id="display-school" class="text-xl font-black mb-6 uppercase"></p>
                <h2 class="text-blue-400 font-bold text-sm tracking-widest mb-1">PENGURUS</h2>
                <p id="display-admin" class="text-lg font-bold uppercase"></p>
            </div>
            <button onclick="location.reload()" class="mt-8 bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white px-4 py-3 rounded-xl text-sm font-bold transition-colors w-full">
                <i class="fas fa-sign-out-alt mr-2"></i> Log Keluar
            </button>
        </div>

        <div class="p-8 md:w-2/3">
            <h3 class="text-2xl font-black mb-6 border-b border-slate-700 pb-4"><i class="fas fa-user-plus mr-2 text-blue-500"></i> Pendaftaran Murid</h3>
            
            <div class="flex space-x-2 mb-6">
                <button onclick="switchTab('manual')" id="tab-manual" class="px-4 py-2 bg-blue-600 rounded-lg font-bold text-sm">Daftar Manual</button>
                <button onclick="switchTab('csv')" id="tab-csv" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold text-sm">Muat Naik CSV</button>
            </div>

            <div id="panel-manual" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Nama Penuh Murid</label>
                    <input id="student-name" type="text" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-blue-500 uppercase" placeholder="Contoh: AHMAD ALI">
                </div>
                <div class="flex space-x-4">
                    <div class="w-1/2">
                        <label class="block text-sm text-slate-400 mb-1">Kelas</label>
                        <select id="student-class" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-blue-500 uppercase cursor-pointer"></select>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm text-slate-400 mb-1">Passcode Murid</label>
                        <input id="student-passcode" type="text" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-blue-500 font-mono" placeholder="Cth: 1234">
                    </div>
                </div>
                <button onclick="registerSingleStudent()" class="w-full mt-4 py-3 bg-green-600 hover:bg-green-500 font-bold rounded-xl transition-all">
                    <i class="fas fa-check-circle mr-1"></i> Daftar Murid Ini
                </button>
            </div>

            <div id="panel-csv" class="hidden space-y-4">
                <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600 text-sm text-slate-300">
                    <p class="font-bold text-white mb-2"><i class="fas fa-info-circle text-blue-400"></i> Format Fail CSV Mesti Tepat:</p>
                    <ul class="list-disc pl-5 space-y-1">
                        <li>Lajur 1: <strong>Nama</strong></li>
                        <li>Lajur 2: <strong>Kelas</strong></li>
                        <li>Lajur 3: <strong>Passcode</strong></li>
                    </ul>
                </div>
                <input type="file" id="csv-file" accept=".csv" class="w-full p-3 bg-slate-700 rounded-lg cursor-pointer">
                <button onclick="uploadCSV()" class="w-full mt-4 py-3 bg-indigo-600 hover:bg-indigo-500 font-bold rounded-xl transition-all">
                    <i class="fas fa-upload mr-1"></i> Muat Naik & Daftar Pukal
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDX6PNKeGLMEpyBtnxtvpmyGFyjFq09N5Y",
            authDomain: "lexiquestv2.firebaseapp.com",
            projectId: "lexiquestv2",
            storageBucket: "lexiquestv2.firebasestorage.app",
            messagingSenderId: "262850068996",
            appId: "1:262850068996:web:64e28cf9757f2739ef6b51",
            measurementId: "G-G4T1JCPH88",
            databaseURL: "https://lexiquestv2-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentSchoolData = null;

        document.getElementById("teacher-pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") loginTeacher();
        });

        async function loginTeacher() {
            const pass = document.getElementById('teacher-pass').value.trim();
            const btn = document.getElementById('btn-login');
            if (!pass) return alert("Sila masukkan passcode!");

            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyemak...';
                const docRef = await db.collection("school_admins").doc(pass).get();
                if (docRef.exists) {
                    currentSchoolData = docRef.data();
                    setupDashboard();
                } else {
                    alert("❌ Passcode tidak dijumpai.");
                }
            } catch (error) {
                alert("Ralat sambungan: " + error.message);
            } finally {
                btn.innerHTML = 'MASUK';
            }
        }

        function setupDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('display-school').innerText = currentSchoolData.schoolName;
            document.getElementById('display-admin').innerText = currentSchoolData.adminName;

            const classSelect = document.getElementById('student-class');
            classSelect.innerHTML = ''; 
            currentSchoolData.classes.forEach(c => {
                const option = document.createElement('option');
                option.value = c; option.innerText = c;
                classSelect.appendChild(option);
            });
        }

        // --- DIREKA KHAS UNTUK MENYOKONG auth.js (Koleksi 'players') ---
        async function registerSingleStudent() {
            const name = document.getElementById('student-name').value.trim().toUpperCase();
            const className = document.getElementById('student-class').value;
            const passcode = document.getElementById('student-passcode').value.trim();

            if (!name || !passcode) return alert("Sila isi nama dan passcode!");

            // Wujudkan format ID Dokumen sama seperti auth.js
            const docId = `${currentSchoolData.schoolName}_${className}_${name}`.replace(/\s+/g, '_');

            try {
                await db.collection("players").doc(docId).set({
                    name: name,
                    class: className,
                    school: currentSchoolData.schoolName,
                    passcode: passcode,
                    coins: 0,
                    inventory: [],
                    avatars: {},
                    activeAvatar: null,
                    achievements: [],
                    activeTitle: "Novice",
                    totalScore: 0,
                    claimedLevels: [],
                    lastPlayed: [],
                    games: {},
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert(`✅ Murid bernama ${name} berjaya didaftarkan!`);
                document.getElementById('student-name').value = '';
                document.getElementById('student-passcode').value = '';
            } catch (error) {
                alert("Ralat: " + error.message);
            }
        }

        function uploadCSV() {
            const fileInput = document.getElementById('csv-file');
            if (!fileInput.files.length) return alert("Sila pilih fail CSV!");

            const reader = new FileReader();
            reader.onload = async function(e) {
                const rows = e.target.result.split('\n').filter(row => row.trim() !== '');
                if(rows[0].toLowerCase().includes('nama')) rows.shift();

                let successCount = 0;
                const batch = db.batch(); 

                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 3) {
                        const name = cols[0].trim().toUpperCase();
                        const className = cols[1].trim().toUpperCase();
                        const passcode = cols[2].trim();

                        // Wujudkan format ID Dokumen sama seperti auth.js
                        const docId = `${currentSchoolData.schoolName}_${className}_${name}`.replace(/\s+/g, '_');
                        const newDocRef = db.collection("players").doc(docId);

                        batch.set(newDocRef, {
                            name: name,
                            class: className,
                            school: currentSchoolData.schoolName,
                            passcode: passcode,
                            coins: 0,
                            inventory: [],
                            avatars: {},
                            activeAvatar: null,
                            achievements: [],
                            activeTitle: "Novice",
                            totalScore: 0,
                            claimedLevels: [],
                            lastPlayed: [],
                            games: {},
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        successCount++;
                    }
                });

                try {
                    await batch.commit();
                    alert(`✅ BERJAYA! ${successCount} orang murid telah didaftarkan.`);
                    fileInput.value = ''; 
                } catch (error) {
                    alert("Ralat memuat naik: " + error.message);
                }
            };
            reader.readAsText(fileInput.files[0]);
        }

        function switchTab(tab) {
            if (tab === 'manual') {
                document.getElementById('panel-manual').classList.remove('hidden');
                document.getElementById('panel-csv').classList.add('hidden');
                document.getElementById('tab-manual').classList.replace('bg-slate-700', 'bg-blue-600');
                document.getElementById('tab-csv').classList.replace('bg-blue-600', 'bg-slate-700');
            } else {
                document.getElementById('panel-csv').classList.remove('hidden');
                document.getElementById('panel-manual').classList.add('hidden');
                document.getElementById('tab-csv').classList.replace('bg-slate-700', 'bg-blue-600');
                document.getElementById('tab-manual').classList.replace('bg-blue-600', 'bg-slate-700');
            }
        }
    </script>
</body>
</html>
