<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiQuest V2 - Portal Guru</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <!-- SweetAlert2 (Diperlukan oleh shop.js) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-900 min-h-screen font-['Poppins'] flex items-center justify-center text-white p-4">

    <!-- BAHAGIAN LOG MASUK -->
    <div id="login-section" class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-blue-500 text-center">
        <i class="fas fa-chalkboard-teacher text-5xl text-blue-500 mb-4"></i>
        <h1 class="text-2xl font-black mb-2">PORTAL GURU</h1>
        <p class="text-slate-400 text-sm mb-6">Sila masukkan Passcode Sekolah anda</p>
        
        <input type="password" id="teacher-pass" placeholder="Contoh: SCX2026" class="w-full p-4 mb-4 bg-slate-700 text-white rounded-xl outline-none text-center tracking-widest text-lg font-mono focus:ring-2 focus:ring-blue-500">
        <button id="btn-login" onclick="loginTeacher()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all shadow-lg hover:shadow-blue-500/30">
            MASUK
        </button>
    </div>

    <!-- BAHAGIAN PAPAN PEMUKA (DASHBOARD) -->
    <div id="dashboard-section" class="hidden w-full max-w-5xl bg-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <!-- PANEL TEPI (SIDEBAR NAVIGATION) -->
        <div class="bg-slate-900 p-8 md:w-1/3 border-b md:border-b-0 md:border-r border-slate-700 flex flex-col justify-between">
            <div>
                <h2 class="text-blue-400 font-bold text-sm tracking-widest mb-1">SEKOLAH</h2>
                <p id="display-school" class="text-xl font-black mb-6 uppercase"></p>
                <h2 class="text-blue-400 font-bold text-sm tracking-widest mb-1">PENGURUS</h2>
                <p id="display-admin" class="text-lg font-bold uppercase"></p>

                <!-- Menu Navigasi Guru -->
                <nav class="mt-8 space-y-2">
                    <button onclick="switchMainMenu('registration')" id="nav-reg" class="w-full text-left px-4 py-3 bg-blue-600 rounded-xl font-bold transition-all shadow-md">
                        <i class="fas fa-users w-6"></i> Pendaftaran
                    </button>
                    <button onclick="switchMainMenu('shop')" id="nav-shop" class="w-full text-left px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-300 font-bold transition-all">
                        <i class="fas fa-store w-6"></i> Pengurusan Kedai
                    </button>
                </nav>
            </div>
            
            <button onclick="window.location.href='https://ediharianto010474.github.io/lexiquestv2'" class="mt-8 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white px-4 py-3 rounded-xl text-sm font-bold transition-colors w-full border border-red-500/20">
    <i class="fas fa-sign-out-alt mr-2"></i> Log Keluar
</button>
        </div>

        <!-- 1. KANDUNGAN: PENDAFTARAN MURID -->
        <div id="section-registration" class="p-8 md:w-2/3">
            <h3 class="text-2xl font-black mb-6 border-b border-slate-700 pb-4"><i class="fas fa-user-plus mr-2 text-blue-500"></i> Pendaftaran Murid</h3>
            
            <div class="flex space-x-2 mb-6">
                <button onclick="switchTab('manual')" id="tab-manual" class="px-4 py-2 bg-blue-600 rounded-lg font-bold text-sm">Daftar Manual</button>
                <button onclick="switchTab('csv')" id="tab-csv" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold text-sm">Muat Naik CSV</button>
            </div>

            <!-- Daftar Manual -->
            <div id="panel-manual" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Nama Penuh Murid</label>
                    <input id="student-name" type="text" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-blue-500 uppercase" placeholder="Contoh: AHMAD ALI">
                </div>
                <div class="flex space-x-4">
                    <div class="w-1/2">
                        <label class="block text-sm text-slate-400 mb-1">Kelas</label>
                        <select id="student-class" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-blue-500 uppercase cursor-pointer"></select>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm text-slate-400 mb-1">Passcode Murid</label>
                        <input id="student-passcode" type="text" class="w-full p-3 bg-slate-700 rounded-lg outline-none focus:ring-2 ring-blue-500 font-mono" placeholder="Cth: 1234">
                    </div>
                </div>
                <button onclick="registerSingleStudent()" class="w-full mt-4 py-3 bg-green-600 hover:bg-green-500 font-bold rounded-xl transition-all shadow-md">
                    <i class="fas fa-check-circle mr-1"></i> Daftar Murid Ini
                </button>
            </div>

            <!-- Daftar CSV -->
            <div id="panel-csv" class="hidden space-y-4">
                <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600 text-sm text-slate-300">
                    <p class="font-bold text-white mb-2"><i class="fas fa-info-circle text-blue-400"></i> Format Fail CSV Mesti Tepat:</p>
                    <ul class="list-disc pl-5 space-y-1">
                        <li>Lajur 1: <strong>Nama</strong></li>
                        <li>Lajur 2: <strong>Kelas</strong></li>
                        <li>Lajur 3: <strong>Passcode</strong></li>
                    </ul>
                </div>
                <input type="file" id="csv-file" accept=".csv" class="w-full p-3 bg-slate-700 rounded-lg cursor-pointer">
                <button onclick="uploadCSV()" class="w-full mt-4 py-3 bg-indigo-600 hover:bg-indigo-500 font-bold rounded-xl transition-all shadow-md">
                    <i class="fas fa-upload mr-1"></i> Muat Naik & Daftar Pukal
                </button>
            </div>
        </div>

        <!-- 2. KANDUNGAN: PENGURUSAN KEDAI (DARI SHOP.JS) -->
        <div id="section-shop" class="hidden p-8 md:w-2/3 flex flex-col h-full max-h-screen">
            <h3 class="text-2xl font-black mb-6 border-b border-slate-700 pb-4">
                <i class="fas fa-store mr-2 text-indigo-400"></i> Pengurusan Kedai
            </h3>
            
            <div class="flex space-x-2 mb-6 overflow-x-auto pb-2 shrink-0">
                <button onclick="loadAdminOrders(); setActiveShopTab('orders')" id="tab-orders" class="px-5 py-2 bg-indigo-600 text-white rounded-lg font-bold text-sm whitespace-nowrap shadow-md">
                    <i class="fas fa-ticket-alt mr-1"></i> Tuntutan Semasa
                </button>
                <button onclick="loadAdminInventory(); setActiveShopTab('inventory')" id="tab-inventory" class="px-5 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg font-bold text-sm whitespace-nowrap">
                    <i class="fas fa-boxes mr-1"></i> Stok Inventori
                </button>
            </div>

            <!-- Kontena Injeksi untuk shop.js -->
            <div id="admin-content" class="bg-slate-100 text-slate-800 p-4 rounded-xl flex-grow overflow-y-auto">
                <p class="text-slate-500 text-center py-10 font-medium">Sila pilih tab menu di atas untuk memuatkan pangkalan data.</p>
            </div>
        </div>

    </div>

    <!-- MODAL URUS BARANG KEDAI (TERSEMBUNYI) -->
    <div id="admin-item-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white text-slate-800 rounded-3xl p-6 w-full max-w-lg shadow-2xl">
            <h3 class="text-xl font-bold mb-4 border-b pb-3"><i class="fas fa-box-open text-indigo-600 mr-2"></i> Urus Barangan Kedai</h3>
            
            <input type="hidden" id="admin-item-action">
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ID ITEM KOD (Unik & Tanpa Spasi)</label>
                    <input id="admin-item-id" type="text" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl outline-none uppercase font-mono text-sm focus:ring-2 focus:ring-indigo-400" placeholder="Contoh: PEN_BIRU">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Nama Barang</label>
                    <input id="admin-item-name" type="text" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-400" placeholder="Contoh: Pen Gel Biru Eksklusif">
                </div>
                <div class="flex gap-3">
                    <div class="w-1/2">
                        <label class="block text-xs font-bold text-slate-500 mb-1">Harga (Koin)</label>
                        <input id="admin-item-price" type="number" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-400" placeholder="100">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-bold text-slate-500 mb-1">Stok Semasa</label>
                        <input id="admin-item-stock" type="number" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-400" placeholder="50">
                    </div>
                </div>
                <div class="flex gap-3">
                    <div class="w-1/2">
                        <label class="block text-xs font-bold text-slate-500 mb-1">Kategori</label>
                        <select id="admin-item-category" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-400">
                            <option value="edu">Edu Shop (Alat Tulis)</option>
                            <option value="gift">Gift Shop (Cenderahati)</option>
                        </select>
                    </div>
                    <div class="w-1/2">
    <label class="block text-xs font-bold text-slate-500 mb-1">Ikon Barang</label>
    <select id="admin-item-icon" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-400 cursor-pointer">
        <option value="fas fa-box">📦 Kotak (Lalai/Default)</option>
        <option value="fas fa-pen">🖊️ Pen / Pensel</option>
        <option value="fas fa-eraser">🧽 Pemadam</option>
        <option value="fas fa-ruler">📏 Pembaris / Set Geometri</option>
        <option value="fas fa-book">📚 Buku</option>
        <option value="fas fa-palette">🎨 Warna Air / Seni</option>
        <option value="fas fa-sticky-note">📝 Sticky Note / Kertas</option>
        <option value="fas fa-gift">🎁 Kotak Hadiah</option>
        <option value="fas fa-key">🔑 Keychain (Kunci)</option>
        <option value="fas fa-bookmark">🔖 Bookmark</option>
        <option value="fas fa-id-card">💳 Kad / ID</option>
        <option value="fas fa-ticket-alt">🎫 Tiket / Pas Keluar</option>
        <option value="fas fa-star">⭐ Bintang</option>
    </select>
</div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Penerangan Ringkas</label>
                    <input id="admin-item-desc" type="text" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-400" placeholder="Sesuai untuk peperiksaan...">
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
                <button onclick="closeItemForm()" class="px-5 py-2.5 bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-xl font-bold text-sm transition-colors">Batal</button>
                <button id="admin-save-item-btn" onclick="submitItemForm()" class="px-5 py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl font-bold text-sm transition-colors shadow-lg shadow-indigo-200"><i class="fas fa-save mr-1"></i> Simpan Data</button>
            </div>
        </div>
    </div>

    <!-- Muatkan fail ekosistem kedai -->
    <script src="shop.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDX6PNKeGLMEpyBtnxtvpmyGFyjFq09N5Y",
            authDomain: "lexiquestv2.firebaseapp.com",
            projectId: "lexiquestv2",
            storageBucket: "lexiquestv2.firebasestorage.app",
            messagingSenderId: "262850068996",
            appId: "1:262850068996:web:64e28cf9757f2739ef6b51",
            measurementId: "G-G4T1JCPH88",
            databaseURL: "https://lexiquestv2-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        // Semak sama ada Firebase sudah diinisialisasi (mengelakkan konflik dengan shop.js)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        let currentSchoolData = null;

        document.getElementById("teacher-pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") loginTeacher();
        });

        async function loginTeacher() {
            const pass = document.getElementById('teacher-pass').value.trim();
            const btn = document.getElementById('btn-login');
            if (!pass) return Swal.fire('Ralat', 'Sila masukkan passcode!', 'warning');

            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyemak...';
                const docRef = await db.collection("school_admins").doc(pass).get();
                if (docRef.exists) {
                    currentSchoolData = docRef.data();
                    setupDashboard();
                } else {
                    Swal.fire('Gagal', 'Passcode tidak dijumpai.', 'error');
                }
            } catch (error) {
                Swal.fire('Ralat Rangkaian', error.message, 'error');
            } finally {
                btn.innerHTML = 'MASUK';
            }
        }

        function setupDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('display-school').innerText = currentSchoolData.schoolName;
            document.getElementById('display-admin').innerText = currentSchoolData.adminName;

            const classSelect = document.getElementById('student-class');
            classSelect.innerHTML = ''; 
            currentSchoolData.classes.forEach(c => {
                const option = document.createElement('option');
                option.value = c; option.innerText = c;
                classSelect.appendChild(option);
            });
        }

        // FUNGSI NAVIGASI MENU UTAMA (SIDEBAR)
        function switchMainMenu(menuName) {
            const secReg = document.getElementById('section-registration');
            const secShop = document.getElementById('section-shop');
            const navReg = document.getElementById('nav-reg');
            const navShop = document.getElementById('nav-shop');

            // Reset gaya butang sidebar
            navReg.className = 'w-full text-left px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-300 font-bold transition-all';
            navShop.className = 'w-full text-left px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-300 font-bold transition-all';

            if (menuName === 'registration') {
                secReg.classList.remove('hidden');
                secShop.classList.add('hidden');
                navReg.className = 'w-full text-left px-4 py-3 bg-blue-600 text-white rounded-xl font-bold transition-all shadow-md';
            } else if (menuName === 'shop') {
                secReg.classList.add('hidden');
                secShop.classList.remove('hidden');
                navShop.className = 'w-full text-left px-4 py-3 bg-indigo-600 text-white rounded-xl font-bold transition-all shadow-md';
                
                // Automatik panggil fungsi dari shop.js apabila dibuka
                loadAdminOrders();
                setActiveShopTab('orders');
            }
        }

        // FUNGSI NAVIGASI TAB DI DALAM PENGURUSAN KEDAI
        function setActiveShopTab(tabName) {
            const tabOrders = document.getElementById('tab-orders');
            const tabInventory = document.getElementById('tab-inventory');

            tabOrders.className = 'px-5 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg font-bold text-sm whitespace-nowrap';
            tabInventory.className = 'px-5 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg font-bold text-sm whitespace-nowrap';

            if (tabName === 'orders') {
                tabOrders.className = 'px-5 py-2 bg-indigo-600 text-white rounded-lg font-bold text-sm whitespace-nowrap shadow-md';
            } else {
                tabInventory.className = 'px-5 py-2 bg-indigo-600 text-white rounded-lg font-bold text-sm whitespace-nowrap shadow-md';
            }
        }

        // FUNGSI NAVIGASI TAB PENDAFTARAN MURID
        function switchTab(tab) {
            if (tab === 'manual') {
                document.getElementById('panel-manual').classList.remove('hidden');
                document.getElementById('panel-csv').classList.add('hidden');
                document.getElementById('tab-manual').classList.replace('bg-slate-700', 'bg-blue-600');
                document.getElementById('tab-csv').classList.replace('bg-blue-600', 'bg-slate-700');
            } else {
                document.getElementById('panel-csv').classList.remove('hidden');
                document.getElementById('panel-manual').classList.add('hidden');
                document.getElementById('tab-csv').classList.replace('bg-slate-700', 'bg-blue-600');
                document.getElementById('tab-manual').classList.replace('bg-blue-600', 'bg-slate-700');
            }
        }

        // (Fungsi daftar murid kekal sama...)
        async function registerSingleStudent() {
            const name = document.getElementById('student-name').value.trim().toUpperCase();
            const className = document.getElementById('student-class').value;
            const passcode = document.getElementById('student-passcode').value.trim();

            if (!name || !passcode) return Swal.fire('Peringatan', 'Sila isi nama dan passcode!', 'warning');

            const docId = `${currentSchoolData.schoolName}_${className}_${name}`.replace(/\s+/g, '_');

            try {
                await db.collection("players").doc(docId).set({
                    name: name,
                    class: className,
                    school: currentSchoolData.schoolName,
                    passcode: passcode,
                    coins: 0,
                    inventory: [],
                    avatars: {},
                    activeAvatar: null,
                    achievements: [],
                    activeTitle: "Novice",
                    totalScore: 0,
                    claimedLevels: [],
                    lastPlayed: [],
                    games: {},
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                Swal.fire('Pendaftaran Berjaya!', `Murid bernama ${name} didaftarkan!`, 'success');
                document.getElementById('student-name').value = '';
                document.getElementById('student-passcode').value = '';
            } catch (error) {
                Swal.fire('Ralat', error.message, 'error');
            }
        }

        function uploadCSV() {
            const fileInput = document.getElementById('csv-file');
            if (!fileInput.files.length) return Swal.fire('Peringatan', 'Sila pilih fail CSV!', 'warning');

            const reader = new FileReader();
            reader.onload = async function(e) {
                const rows = e.target.result.split('\n').filter(row => row.trim() !== '');
                if(rows[0].toLowerCase().includes('nama')) rows.shift();

                let successCount = 0;
                const batch = db.batch(); 

                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 3) {
                        const name = cols[0].trim().toUpperCase();
                        const className = cols[1].trim().toUpperCase();
                        const passcode = cols[2].trim();

                        const docId = `${currentSchoolData.schoolName}_${className}_${name}`.replace(/\s+/g, '_');
                        const newDocRef = db.collection("players").doc(docId);

                        batch.set(newDocRef, {
                            name: name,
                            class: className,
                            school: currentSchoolData.schoolName,
                            passcode: passcode,
                            coins: 0,
                            inventory: [],
                            avatars: {},
                            activeAvatar: null,
                            achievements: [],
                            activeTitle: "Novice",
                            totalScore: 0,
                            claimedLevels: [],
                            lastPlayed: [],
                            games: {},
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        successCount++;
                    }
                });

                try {
                    await batch.commit();
                    Swal.fire('Berjaya Pukal', `${successCount} orang murid telah didaftarkan.`, 'success');
                    fileInput.value = ''; 
                } catch (error) {
                    Swal.fire('Ralat Muat Naik', error.message, 'error');
                }
            };
            reader.readAsText(fileInput.files[0]);
        }
    </script>
</body>
</html>
